<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basecamp — Log in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>

<div class="auth-box">
  <h2>Log in</h2>
  <form id="loginForm">
    <div class="field"><label>Email</label><input type="email" id="email" required></div>
    <div class="field"><label>Password</label><input type="password" id="password" required></div>
    <button class="btn" type="submit" style="width:100%;">Log in</button>
    <p class="error" id="err"></p>
  </form>
  <p class="hint">Demo accounts: asha@demo.com / ravi@demo.com / priya@demo.com — password: demo1234</p>
  <p class="hint">No account? <a href="/register.html" style="text-decoration:underline;">Sign up</a></p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script>
loadNav();
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    await api('/api/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    window.location.href = '/';
  } catch (err) {
    document.getElementById('err').textContent = err.message;
  }
});
</script>
</body>
</html>
